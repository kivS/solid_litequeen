server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location = /up {
        access_log off;
        default_type text/plain;
        return 200 'OK';
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }
}
